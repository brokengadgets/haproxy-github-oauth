# HAProxy configuration — brokengadgets.io
#
# Topology:
#   Public HAProxy host  (this file lives here; OAuth app also runs here)
#     └─ VPN tunnel ──► Docker host 10.99.0.2  (all services)
#
# Requires: HAProxy 2.6+, JWT_SECRET set in environment (see below)
#
# Deploy:
#   sudo cp haproxy/haproxy.cfg /etc/haproxy/haproxy.cfg
#   sudo cp haproxy/lua/jwt_auth.lua /etc/haproxy/lua/jwt_auth.lua
#   haproxy -c -f /etc/haproxy/haproxy.cfg && systemctl reload haproxy

global
    log /dev/log local0
    log /dev/log local1 notice
    maxconn 4096
    user haproxy
    group haproxy
    daemon

    lua-prepend-path /etc/haproxy/lua/?.lua
    lua-load /etc/haproxy/lua/jwt_auth.lua

    # Must match JWT_SECRET in the OAuth app's environment.
    # Override in /etc/haproxy/haproxy.cfg.d/ or systemd unit EnvironmentFile.
    setenv JWT_SECRET "REPLACE_WITH_JWT_SECRET"

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    option  http-server-close
    timeout connect  5s
    timeout client   30s
    timeout server   60s
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http

# ── Frontend ───────────────────────────────────────────────────────────────────

frontend https_in
    bind *:443 ssl crt /etc/haproxy/certs/brokengadgets.io.pem alpn h2,http/1.1
    bind *:80
    http-request redirect scheme https unless { ssl_fc }

    # Validate JWT cookie on every request; sets txn.jwt_valid and txn.teams.
    http-request lua.check_jwt

    # Unauthenticated requests → OAuth login, preserving the original URL.
    acl has_jwt var(txn.jwt_valid) -m bool
    acl is_oauth_app hdr(host) -i auth.brokengadgets.io
    http-request redirect location https://auth.brokengadgets.io/login?rd=https://%[req.hdr(Host)]%[path] \
        if !has_jwt !is_oauth_app

    use_backend be_oauth          if { hdr(host) -i auth.brokengadgets.io }
    use_backend be_gitea          if { hdr(host) -i gitea.brokengadgets.io }
    use_backend be_nextcloud      if { hdr(host) -i nextcloud.brokengadgets.io }
    use_backend be_jellyfin       if { hdr(host) -i jellyfin.brokengadgets.io }
    use_backend be_jellyfin_movies if { hdr(host) -i movies.brokengadgets.io }
    use_backend be_frigate        if { hdr(host) -i frigate.brokengadgets.io }
    default_backend be_default

# ── OAuth app (localhost, no JWT gate) ─────────────────────────────────────────

backend be_oauth
    server oauth 127.0.0.1:4180 check

# ── Gated backends — Docker host reachable at 10.99.0.2 via VPN ───────────────

backend be_gitea
    acl allowed var(txn.teams) -m sub brokengadgets/gitea
    http-request deny status 403 if !allowed
    server gitea 10.99.0.2:3000 check

backend be_nextcloud
    acl allowed var(txn.teams) -m sub brokengadgets/nextcloud
    http-request deny status 403 if !allowed
    server nextcloud 10.99.0.2:8443 ssl verify none check

backend be_jellyfin
    acl allowed var(txn.teams) -m sub brokengadgets/jellyfin
    http-request deny status 403 if !allowed
    server jellyfin 10.99.0.2:8080 check

backend be_jellyfin_movies
    acl allowed var(txn.teams) -m sub brokengadgets/jellyfin
    http-request deny status 403 if !allowed
    server jellyfin_movies 10.99.0.2:8082 check

backend be_frigate
    acl allowed var(txn.teams) -m sub brokengadgets/frigate
    http-request deny status 403 if !allowed
    # NOTE: Frigate's 8971 must bind to 0.0.0.0 in its compose.yaml:
    #   ports: ["0.0.0.0:8971:8971"]
    server frigate 10.99.0.2:8971 ssl verify none check

# ── Default ────────────────────────────────────────────────────────────────────

backend be_default
    http-request deny status 404
