services:
  haproxy-github-oauth:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: haproxy-github-oauth:latest
    container_name: haproxy-github-oauth
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "127.0.0.1:4180:4180"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4180/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      default:
        # Match the OpenVPN tunnel MTU to avoid fragmentation
        driver_opts:
          com.docker.network.driver.mtu: "1400"

networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "1400"
